<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/circlo-settings.css">
    <title>Acount Settings</title>
</head>

<body>
    <!-- Navbar -->
    <div class="navbar">
        <h2>Circlo</h2>
        <div class="links">
            <a id="hom" href="index.html">Home</a>
            <a id="out" href="login.html">Logout</a>
        </div>
    </div>
    <div class="main">
        <input type="checkbox" id="toggle">
        <label for="toggle" id="menu-btn">☰</label>

        <div class="sidebar">

            <h2>Settings</h2>
            <ul>
                <li><a href="Acount.html">Account</a></li>
                <li><a href="settings.html">Profile</a></li>
            </ul>
        </div>

        <div class="content">
            <div class="card">
                <h2>Account Settings</h2>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="nameInput" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="New password">
                </div>

                <button>Save Changes</button>
            </div>
        </div>
    </div>
    <script src="js/Acount.js"></script>
</body>

</html>>
