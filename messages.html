<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <link rel="stylesheet" href="">
    <link rel="stylesheet"href="css/messages.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

    
    <!-- Navbar -->
    <div class="navbar">
        <h2>Circlo</h2>
        <h2>Messages</h2>
        <div class="links">
            <a id="hom" href="index.html">Home</a>
            <a id="out" href="settings.html">setting</a>
        </div>
    </div>
    <div class="container">
    
        <!-- Sidebar -->
     <div class="sidebar">
    
        <div class="chat-item">
            <div class="avatar">
                <img src="img/wallpaperflare.com_wallpaper.jpg">
                <div class="online"></div>
            </div>
            <div>
                <p>jon Snow</p>
                <small>Typing...</small>
            </div>
        </div>
    
            <div class="chat-item">
                <div class="avatar">
                    <img src="https://i.pravatar.cc/100?img=2">
                </div>
                <div>
                    <p>Sara</p>
                    <small>😂😂😂</small>
                </div>
            </div>

        <div class="chat-item">
            <div class="avatar">
                <img src="img/Screenshot 2026-05-02 193633.png " >
                <div class="online"></div>
            </div>
            <div>
                <p>haifawehbe</p>
                <small>Typing...</small>
                <br>
                <small>❤️ انا بحبك</small>
            </div>
        </div>
     </div>
     
        <!-- Chat -->
        <div class="chat">
    
            <!-- Header -->
            <div class="chat-header">
                <div class="avatar">
                    <img src="img/me.jpeg" width="100" height="45" >
                    <div class="online"></div>
                </div>
                <h3>Ahmed</h3>
            </div>
    
            <!-- Messages -->
            <div class="messages">
                <div class="message left">Hey 👋</div>
                <div class="message right">What's up 🔥</div>
                <div class="message left">All good 😎</div>
            </div>
    
            <!-- Input -->
            <div class="input-area">
    
                <span class="material-icons icon-btn">emoji_emotions</span>
                <span class="material-icons icon-btn">mic</span>
    
                <input type="text" placeholder="Type a message...">
    
                <span class="material-icons send">send</span>
    
            </div>
    
        </div>
    
    </div>

       

  <script src="js/messages.js"></script>
</body>

</html>
